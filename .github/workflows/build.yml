name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --locked

      - name: Strip (linux)
        if: runner.os == 'Linux'
        run: strip target/release/streamlink-video-launcher

      - name: Strip (macos)
        if: runner.os == 'macOS'
        run: strip target/release/streamlink-video-launcher

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: streamlink-video-launcher-${{ matrix.target }}
          path: |
            target/release/streamlink-video-launcher
            target/release/streamlink-video-launcher.exe
          if-no-files-found: warn

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: streamlink-video-launcher-*
          merge-multiple: false

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            streamlink-video-launcher-*/streamlink-video-launcher
            streamlink-video-launcher-*/streamlink-video-launcher.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
